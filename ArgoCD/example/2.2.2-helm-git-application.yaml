apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: helm-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/MaxCloud101/curso-de-helm.git
    targetRevision: main
    path: my_chart

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
